<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>JARVIS COMMAND - fairdeals21-21</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--g:#D4AF37;--g2:#F4E5C3;--bg:#0A0E27;--p:#162447;--ok:#0f0;--off:#f44}
body{font-family:system-ui,sans-serif;background:linear-gradient(135deg,var(--bg),#1a1f3a);color:var(--g2);padding:12px;min-height:100vh}
h1{background:linear-gradient(135deg,var(--g),#FFD700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-size:22px;margin-bottom:16px;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
.box{background:rgba(22,36,71,.9);border:1px solid var(--g);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.box::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--g),transparent);animation:s 3s infinite}
@keyframes s{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.lbl{font-size:10px;color:var(--g);opacity:.7;text-transform:uppercase}
.val{font-size:24px;font-weight:900;color:var(--g);margin:2px 0}
.sub{font-size:11px;opacity:.6}
.panel{background:rgba(22,36,71,.9);border:1px solid var(--g);border-radius:10px;padding:14px;margin:10px 0}
.ph{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.pt{font-weight:700;color:var(--g);font-size:15px}
.site{background:rgba(212,175,55,.08);border:1px solid rgba(212,175,55,.3);border-radius:8px;padding:12px;margin:8px 0}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.sn{font-weight:700;font-size:14px;color:var(--g)}
.st{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:700}
.on{background:var(--ok);color:#000}
.off{background:var(--off);color:#fff}
.si{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;font-size:11px;opacity:.8;margin:6px 0}
.tag{font-size:9px;background:rgba(212,175,55,.2);padding:2px 6px;border-radius:4px;display:inline-block;margin-bottom:4px}
.btn{background:linear-gradient(135deg,var(--g),#FFD700);color:var(--bg);border:none;padding:9px;border-radius:6px;font-weight:700;cursor:pointer;width:100%;margin-top:6px;font-size:13px}
.btn:active{transform:scale(.97)}
.btn2{background:var(--p);color:var(--g);border:1px solid var(--g);padding:6px 10px;font-size:12px;width:auto}
#log{font-family:monospace;font-size:10px;background:#000;padding:8px;border-radius:6px;max-height:120px;overflow-y:auto;line-height:1.4}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<h1>JARVIS COMMAND - fairdeals21-21</h1>

<div class="grid">
<div class="box"><div class="lbl">Seiten Online</div><div class="val" id="on">0/0</div><div class="sub">GitHub Pages</div></div>
<div class="box"><div class="lbl">Gesamt Klicks</div><div class="val" id="c">0</div><div class="sub">Alle Seiten</div></div>
<div class="box"><div class="lbl">Amazon Klicks</div><div class="val" id="ac">0</div><div class="sub">tag=fairdeals21-21</div></div>
<div class="box"><div class="lbl">Provision €</div><div class="val" id="e">0.00</div><div class="sub">Geschätzt</div></div>
</div>

<div class="panel">
<div class="ph">
<div class="pt">🌐 Deine Test-Seiten 2026</div>
<button class="btn2" onclick="checkAll()">↻ Check</button>
</div>
<div id="sites"></div>
</div>

<div class="panel">
<div class="pt" style="margin-bottom:8px">📊 System Log</div>
<div id="log"></div>
</div>

<script>
let CFG={},D=JSON.parse(localStorage.getItem('jd21')||'{"c":0,"ac":0,"e":0,"h":{}}');

async function init(){
log('JARVIS startet...');
try{
const r=await fetch('./sites.json?'+Date.now());
CFG=await r.json();
log(`sites.json geladen: ${CFG.storeID}`);
log(`${CFG.sites.length} Seiten gefunden`);
}catch(e){log('FEHLER: sites.json fehlt');return}
upd();render();checkAll();
setInterval(checkAll,60000);
}

function log(m){
const l=document.getElementById('log');
l.innerHTML+=`[${new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}] ${m}<br>`;
l.scrollTop=l.scrollHeight;
}

function upd(){
const on=CFG.sites.filter(s=>s.status==='on').length;
document.getElementById('on').textContent=`${on}/${CFG.sites.length}`;
document.getElementById('c').textContent=D.c;
document.getElementById('ac').textContent=D.ac;
document.getElementById('e').textContent=D.e.toFixed(2);
}

function save(){
localStorage.setItem('jd21',JSON.stringify(D));
upd();render();
}

function render(){
document.getElementById('sites').innerHTML=CFG.sites.map((s,i)=>`
<div class="site">
<div class="tag">${s.nische}</div>
<div class="sh">
<div class="sn">${s.name}</div>
<span class="st ${s.status==='on'?'on':'off'}">${s.status==='on'?'● ONLINE':'● OFFLINE'}</span>
</div>
<div class="si">
<div>Klicks: ${D.h[s.url]?.c||0}</div>
<div>Amazon: ${D.h[s.url]?.ac||0}</div>
<div>${s.last||'nie'}</div>
</div>
<button class="btn" onclick="go(${i})">Seite öffnen →</button>
</div>`).join('');
}

function go(i){
const s=CFG.sites[i];
if(!D.h[s.url])D.h[s.url]={c:0,ac:0};
D.h[s.url].c++;D.c++;save();
window.open(s.url,'_blank');
log(`Geöffnet: ${s.name}`);
}

async function checkOne(i){
const s=CFG.sites[i];
try{
await fetch(s.url,{mode:'no-cors',cache:'no-store'});
s.status='on';s.last=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
}catch{s.status='off';s.last=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
}

async function checkAll(){
log('Prüfe Status...');
await Promise.all(CFG.sites.map((s,i)=>checkOne(i)));
upd();render();
log('Check fertig');
}

init();
</script>
</body>
</html>
